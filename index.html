<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>editor MINITO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --card: #111111;
    --accent: #e8ff3b;
    --text: #f0f0f0;
    --muted: #777;
    --border: #222;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.35;
  }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 24px 40px;
    position: relative;
    overflow: hidden;
  }

  .hero-video-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    opacity: 0.35;
  }

  .hero > *:not(.hero-video-bg) {
    position: relative;
    z-index: 1;
  }

  .hero::after {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(232,255,59,0.07) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .hero-avatar {
    width: 140px; height: 140px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--accent);
    box-shadow: 0 0 40px rgba(232,255,59,0.2);
    margin-bottom: 28px;
    animation: scaleIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
  }

  .hero-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.35s both;
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 14vw, 110px);
    line-height: 0.9;
    letter-spacing: 2px;
    color: var(--text);
    animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.5s both;
  }

  .hero-title span { color: var(--accent); }

  .hero-stat {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    margin-top: 20px;
    animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.7s both;
  }

  .hero-stat strong {
    color: var(--text);
    font-size: 15px;
  }

  .hero-ctas {
    display: flex;
    gap: 14px;
    margin-top: 36px;
    animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.9s both;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 13px 30px;
    border-radius: 2px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-decoration: none;
    transition: all 0.2s;
    cursor: pointer;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
    font-weight: 700;
  }
  .btn-primary:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,255,59,0.25); }

  .btn-ghost {
    border: 1px solid var(--border);
    color: var(--text);
    background: transparent;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }

  /* ── SECTION HEADING ── */
  .section {
    max-width: 900px;
    margin: 0 auto;
    padding: 80px 24px;
  }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 48px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── CLIENT GRID ── */
  .clients-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 2px;
  }

  .client-card {
    background: var(--card);
    padding: 36px 28px;
    position: relative;
    overflow: hidden;
    transition: background 0.2s;
    border: 1px solid var(--border);
    animation: fadeUp 0.6s ease both;
  }

  .client-card:hover { background: #161616; }

  .client-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 0;
    background: var(--accent);
    transition: height 0.3s ease;
  }
  .client-card:hover::before { height: 100%; }

  .client-thumb {
    width: 64px; height: 64px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 18px;
    border: 2px solid var(--border);
    transition: border-color 0.2s;
  }
  .client-card:hover .client-thumb { border-color: var(--accent); }

  .client-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    line-height: 1;
    margin-bottom: 8px;
  }

  .client-stat {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .client-stat strong { color: var(--accent); }

  /* ── MEGA STAT ── */
  .mega-stat {
    text-align: center;
    padding: 80px 24px;
    background: var(--card);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .mega-stat-img-bg,
  .mega-stat-video-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    opacity: 0.35;
    z-index: 0;
    pointer-events: none;
  }

  .mega-stat::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(232,255,59,0.06) 0%, rgba(0,0,0,0.55) 70%);
    z-index: 1;
  }

  .mega-stat-number,
  .mega-stat-label {
    position: relative;
    z-index: 2;
  }

  .mega-stat-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(60px, 16vw, 140px);
    color: var(--accent);
    line-height: 1;
    position: relative;
  }

  .mega-stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 10px;
    position: relative;
  }

  /* ── SCROLL REVEAL ── */
  .reveal {
    opacity: 0;
    transform: translateY(32px);
    transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1), transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .reveal-scale {
    opacity: 0;
    transform: scale(0.9);
    transition: opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1), transform 0.9s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .reveal-scale.visible {
    opacity: 1;
    transform: scale(1);
  }

  /* ── WORK / VIDEOS ── */
  .work-wrapper {
    position: relative;
    overflow: hidden;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .work-video-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    opacity: 0.18;
    z-index: 0;
    pointer-events: none;
  }

  .work-video-overlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.75) 100%);
    z-index: 1;
    pointer-events: none;
  }

  .work {
    padding: 80px 24px;
    max-width: 1100px;
    margin: 0 auto;
    position: relative;
    z-index: 2;
  }

  .work-header {
    text-align: center;
    margin-bottom: 48px;
  }

  .work-header .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .work-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 8vw, 72px);
    line-height: 1;
    color: var(--text);
  }

  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 24px;
  }

  .video-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.3s;
  }

  .video-card:hover {
    border-color: var(--accent);
    transform: translateY(-4px);
  }

  .video-card iframe {
    width: 100%;
    aspect-ratio: 16 / 9;
    display: block;
    border: none;
  }

  /* ── CONTACT ── */
  .contact {
    text-align: center;
    padding: 80px 24px 60px;
    position: relative;
    overflow: hidden;
  }

  .contact-video-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
    opacity: 0.4;
    pointer-events: none;
  }

  .contact-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.75));
    z-index: 1;
    pointer-events: none;
  }

  .contact > *:not(.contact-video-bg):not(.contact-overlay) {
    position: relative;
    z-index: 2;
  }

  .contact-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 8vw, 72px);
    margin-bottom: 12px;
    line-height: 1;
  }

  .contact-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 36px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 1px;
  }

  .contact-ctas {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    text-align: center;
    padding: 24px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: #333;
    text-transform: uppercase;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* stagger cards */
  .client-card:nth-child(1) { animation-delay: 0.0s; }
  .client-card:nth-child(2) { animation-delay: 0.1s; }
  .client-card:nth-child(3) { animation-delay: 0.2s; }
  .client-card:nth-child(4) { animation-delay: 0.3s; }
  .client-card:nth-child(5) { animation-delay: 0.4s; }
  .client-card:nth-child(6) { animation-delay: 0.5s; }

  /* placeholder avatars using initials */
  .avatar-placeholder {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--accent);
    margin-bottom: 18px;
    transition: border-color 0.2s;
    flex-shrink: 0;
  }
  .client-card:hover .avatar-placeholder { border-color: var(--accent); }

  .hero-avatar-placeholder {
    width: 140px; height: 140px;
    border-radius: 50%;
    background: var(--card);
    border: 3px solid var(--accent);
    box-shadow: 0 0 40px rgba(232,255,59,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: var(--accent);
    margin-bottom: 28px;
    animation: fadeUp 0.8s ease both;
  }

  @media (max-width: 480px) {
    .clients-grid { grid-template-columns: 1fr; }
    .hero-ctas { flex-direction: column; align-items: center; }
  }
</style>
</head>

<script>
  // Intersection Observer for scroll-reveal elements
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add("visible");
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });

  document.querySelectorAll(".reveal, .reveal-scale").forEach(el => observer.observe(el));
</script>
